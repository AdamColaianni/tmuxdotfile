##### PREFIX #####

# Change prefix from Ctrl-b → Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Faster command response
set -s escape-time 0


##### SPLITS #####

# Split panes using intuitive keys
bind | split-window -h
bind - split-window -v

# Open splits in the same directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


##### PANE NAVIGATION #####

# Move between panes with Ctrl + hjkl
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


##### RESIZE PANES #####

# Resize panes using Alt + hjkl
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5


##### WINDOWS #####

# Quick window switching
bind -n C-Left previous-window
bind -n C-Right next-window

# Rename window quickly
bind r command-prompt "rename-window %%"

# Close pane easily
bind x kill-pane


##### MOUSE SUPPORT #####

set -g mouse on


##### VISUALS #####

# Better colors
set -g default-terminal "screen-256color"

# Simple status bar
set -g status-bg black
set -g status-fg white

set -g status-left "#[fg=green]#S"
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M"

# Highlight active pane
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green


##### SCROLLBACK #####

# Large scroll history
set -g history-limit 50000

# Copy mode with vim keys
setw -g mode-keys vi


##### QUALITY OF LIFE #####

# Reload config easily
bind R source-file ~/.tmux.conf \; display-message "Config reloaded"

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
